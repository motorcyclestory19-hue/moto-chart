workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Prepare Web Assets
        script: |
          mkdir -p www
          cp -r index.html css js www/ || true
      - name: Install Dependencies
        script: |
          npm install
          npm install -g @capacitor/cli
      - name: Setup iOS
        script: |
          rm -rf ios
          capacitor add ios
          capacitor sync ios
      - name: Build iOS App
        script: |
          # 파일이 있는 실제 경로로 이동
          cd ios/App
          
          # 경로가 맞는지 확인을 위해 리스트 출력
          ls -F
          
          # 하위 App 폴더 안에 프로젝트 파일이 있는지 확인하고 빌드
          if [ -f "App.xcodeproj/project.pbxproj" ]; then
             xcodebuild -project App.xcodeproj -scheme App -destination 'generic/platform=iOS' -archivePath App.xcarchive archive
          else
             echo "ERROR: Project not found in ios/App/"
             exit 1
          fi
