workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build || ionic build
      - name: Sync native dependencies
        script: |
          export TMPDIR=$(pwd)/temp
          mkdir -p $TMPDIR
          node node_modules/@capacitor/cli/bin/capacitor sync ios
      - name: Install CocoaPods
        script: |
          # 1. ios 폴더가 생성되었는지 확실히 체크합니다.
          ls -R ios
          # 2. Podfile이 있는 경로를 찾아서 설치를 진행합니다.
          cd ios && pod install || (pod repo update && pod install)
      - name: Build for App Store
        script: |
          xcodebuild -workspace ios/*.xcworkspace -scheme App -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
