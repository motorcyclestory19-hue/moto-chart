workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm cache clean --force
          npm install --unsafe-perm
      - name: Build web assets
        script: |
          npm run build || ionic build || echo "Build skipped"
      - name: Add iOS platform and Sync
        script: |
          chmod +x node_modules/.bin/cap
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Find Scheme Names
        script: |
          # 프로젝트에 있는 빌드 설정 이름을 출력합니다. (이걸 보고 무엇을 적어야 할지 알 수 있어요)
          xcodebuild -workspace ios/*.xcworkspace -list
      - name: Build for App Store
        script: |
          # 위에서 확인된 이름으로 아래 --scheme 뒤를 수정할 예정입니다. 일단 Runner로 시도합니다.
          xcode-project build --workspace ios/*.xcworkspace --scheme Runner
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
