workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          # 웹 파일 빌드 (보통 dist 폴더에 생성됨)
          npm run build || ionic build
      - name: Sync native dependencies
        script: |
          # 성공했던 노드 호출 방식을 사용하되, 웹 경로(--webDir)를 강제로 지정합니다
          # dist 폴더가 생성되는 것을 기준으로 합니다
          node node_modules/@capacitor/cli/bin/capacitor sync ios --webDir dist
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for App Store
        script: |
          xcodebuild -workspace ios/*.xcworkspace -scheme App -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
