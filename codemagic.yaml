workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
      groups:
        - app_store_credentials
    scripts:
      - name: Prepare Web Assets
        script: |
          mkdir -p www
          cp -r index.html css js www/ || true
      - name: Install Dependencies
        script: |
          npm install
          npm install -g @capacitor/cli
      - name: Setup iOS
        script: |
          rm -rf ios
          capacitor add ios
          capacitor sync ios
      - name: Build iOS App
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -destination 'generic/platform=iOS' -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key:
          key: $APP_STORE_CONNECT_PRIVATE_KEY
          key_id: $APP_STORE_CONNECT_KEY_ID
          issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
