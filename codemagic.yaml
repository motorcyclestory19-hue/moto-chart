workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Identify and Build
        script: |
          # 1. package.json을 읽어서 'build' 관련 스크립트가 있는지 확인
          # 2. 없다면 강제로 빌드 도구를 실행
          if grep -q '"build":' package.json; then
            npm run build
          elif [ -f "ionic.config.json" ]; then
            ionic build
          else
            echo "빌드 스크립트를 찾을 수 없어 기본 빌드를 시도합니다."
            npm install -g @angular/cli || npm install -g typescript
            # 프로젝트 형태에 따라 적절한 빌드 시도
            (ng build || tsc || echo "빌드 실패")
          fi
      - name: Sync and Build iOS
        script: |
          # 빌드 결과물(dist/www/build) 중 존재하는 것을 찾아 동기화
          WEB_DIR=$(ls -d dist build dist www 2>/dev/null | head -1)
          npx cap sync ios --webDir ${WEB_DIR:-www}
          cd ios && pod install
          xcodebuild -workspace *.xcworkspace -scheme App -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
