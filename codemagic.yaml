workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Prepare Web Assets
        script: |
          mkdir -p www
          cp -r index.html css js www/ || true
      - name: Install Dependencies
        script: |
          npm install
          npm install -g @capacitor/cli
      - name: Setup iOS
        script: |
          rm -rf ios
          capacitor add ios
          capacitor sync ios
      - name: Build iOS App
        script: |
          cd ios/App
          # 워크스페이스 대신 프로젝트 파일(.xcodeproj)을 사용하여 빌드합니다.
          # SPM 방식에서는 -project 플래그를 사용해야 합니다.
          if [ -f "App.xcodeproj" ]; then
             echo "Found project at: App.xcodeproj"
             xcodebuild -project App.xcodeproj -scheme App -destination 'generic/platform=iOS' -archivePath App.xcarchive archive
          else
             echo "ERROR: App.xcodeproj not found!"
             exit 1
          fi
