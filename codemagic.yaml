workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Install Dependencies
        script: |
          npm install
          npm install -g @capacitor/cli
      - name: Add and Sync iOS
        script: |
          rm -rf ios
          capacitor add ios
          # 웹 파일(index.html 등)을 ios 프로젝트로 강제 복사
          capacitor copy
          capacitor sync ios
      - name: Build iOS App
        script: |
          cd ios
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -archivePath App.xcarchive archive
