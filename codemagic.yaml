workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Prepare Web Assets
        script: |
          mkdir -p www
          cp -r index.html css js www/ || true
      - name: Setup iOS
        script: |
          rm -rf ios
          capacitor add ios
          capacitor sync ios
          cd ios/App
          pod init || true
          pod install
      - name: Build iOS App
        script: |
          # 현재 위치를 출력해서 구조 확인
          echo "Current directory: $(pwd)"
          ls -R ios
          
          # xcworkspace 파일이 어디에 숨어있는지 찾아내서 빌드합니다
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -n 1)
          
          if [ -f "$WORKSPACE_PATH" ]; then
             echo "Found workspace at: $WORKSPACE_PATH"
             xcodebuild -workspace "$WORKSPACE_PATH" -scheme App -archivePath App.xcarchive archive
          else
             echo "ERROR: xcworkspace NOT FOUND anywhere!"
             exit 1
          fi
