workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
      # 중요: 여기서 등록하신 그룹 이름을 불러와야 합니다!
      groups:
        - app_store_credentials 
    scripts:
      # ... (기존 스크립트 내용 유지)
      - name: Build iOS App
        script: |
          cd ios/App
          # 서명이 자동으로 수행되도록 프로젝트 빌드
          xcodebuild -project App.xcodeproj -scheme App -destination 'generic/platform=iOS' -archivePath App.xcarchive archive
    # 퍼블리싱 섹션이 환경 변수를 참조합니다
    publishing:
      app_store_connect:
        api_key:
          key: $APP_STORE_CONNECT_PRIVATE_KEY
          key_id: $APP_STORE_CONNECT_KEY_ID
          issuer_id: $APP_STORE_CONNECT_ISSUER_ID
