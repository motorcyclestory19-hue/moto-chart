workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          # 빌드 명령어를 프로젝트 환경에 맞춰 가장 확실한 방법으로 실행합니다.
          # npm run build로 안 되면 npm run ionic:build 또는 ionic build를 시도합니다.
          npm run build || npm run ionic:build || ionic build || echo "Build script not found"
      - name: Find and Sync native dependencies
        script: |
          # 파일 구조를 먼저 확인합니다.
          ls -F
          # 생성된 폴더가 있다면 해당 경로를 직접 찾아 동기화합니다.
          [ -d "dist" ] && npx cap sync ios --webDir dist || \
          [ -d "build" ] && npx cap sync ios --webDir build || \
          [ -d "www" ] && npx cap sync ios --webDir www || \
          echo "웹 빌드 폴더를 찾을 수 없습니다."
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for App Store
        script: |
          xcodebuild -workspace ios/*.xcworkspace -scheme App -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
