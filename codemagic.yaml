workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Prepare Web Assets
        script: |
          mkdir -p www
          cp -r index.html css js www/ || true
      - name: Install Dependencies
        script: |
          npm install
          # 전역 설치 대신 로컬 bin을 활용합니다
      - name: Setup iOS
        script: |
          rm -rf ios
          # npx를 사용하여 설치된 패키지를 정확히 호출
          npx cap add ios
          npx cap sync ios
      - name: Build iOS App
        script: |
          # 파일 구조가 맞는지 한 번 더 확인
          ls -R ios
          
          # xcworkspace 파일이 있는 곳을 자동으로 찾아 빌드
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          
          if [ -f "$WORKSPACE_PATH" ]; then
             echo "Found workspace at: $WORKSPACE_PATH"
             xcodebuild -workspace "$WORKSPACE_PATH" -scheme App -archivePath App.xcarchive archive
          else
             echo "ERROR: xcworkspace not found! Check directory structure."
             ls -R ios
             exit 1
          fi
