workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm cache clean --force
          npm install --unsafe-perm
      - name: Build web assets
        script: |
          npm run build || ionic build || echo "Build skipped"
      - name: Add iOS platform and Sync
        script: |
          chmod +x node_modules/.bin/cap
          # ios 폴더가 없으면 새로 만들고 동기화합니다
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: CocoaPods
        script: |
          find . -name "Podfile" -exec dirname {} \; | xargs -I {} sh -c 'cd {} && pod install'
      - name: Build for App Store
        script: |
          xcode-project build
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
