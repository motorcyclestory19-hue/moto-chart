workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Prepare Web Assets
        script: |
          mkdir -p www
          cp -r index.html css js www/ || true
      - name: Install Dependencies
        script: |
          npm install
          npm install -g @capacitor/cli
      - name: Force Create iOS Project
        script: |
          rm -rf ios
          capacitor add ios
          capacitor copy
          capacitor sync ios
          # 파일 구조 확인용 (로그에 찍힙니다)
          echo "Checking contents of ios directory:"
          ls -R ios
      - name: Build iOS App
        script: |
          # ios 폴더로 이동 후 실제 파일 확인
          cd ios
          if [ -d "App" ]; then
             echo "Found App directory"
             # 워크스페이스가 있는지 다시 확인
             if [ -f "App.xcworkspace" ]; then
                pod install
                xcodebuild -workspace App.xcworkspace -scheme App -archivePath App.xcarchive archive
             else
                echo "ERROR: App.xcworkspace missing!"
                ls -F
                exit 1
             fi
          else
             echo "ERROR: App directory missing!"
             exit 1
          fi
