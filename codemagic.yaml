workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          # 빌드 명령을 실행하고, 결과물이 존재하는지 확인합니다
          npm run build || ionic build
          ls -F
      - name: Sync native dependencies
        script: |
          # webDir을 강제로 dist로 지정하고 동기화합니다
          npx cap sync ios --webDir dist
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for App Store
        script: |
          xcode-project build --workspace ios/*.xcworkspace --scheme App
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
