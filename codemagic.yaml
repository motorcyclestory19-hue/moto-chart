workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          # 웹 파일들을 생성합니다. (오류 방지를 위해 표준 명령어를 사용합니다)
          npm run build
      - name: Sync native dependencies
        script: |
          # 웹 파일이 생성된 후, 그 폴더를 명시적으로 capacitor에 알려주며 동기화합니다
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for App Store
        script: |
          # 프로젝트를 빌드합니다.
          xcode-project build --workspace ios/*.xcworkspace --scheme App
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
