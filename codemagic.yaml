workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Install Node Modules
        script: |
          npm install
      - name: Build Web Assets
        script: |
          npm run build
      - name: Add and Sync iOS
        script: |
          # 빌드 툴을 직접 설치하여 권한 문제 해결
          npm install -g @capacitor/cli
          npx cap add ios || true
          npx cap sync ios
      - name: Build iOS App
        script: |
          cd ios
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -archivePath App.xcarchive archive
