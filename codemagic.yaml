workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm cache clean --force
          npm install --unsafe-perm
      - name: Build web assets
        script: |
          npm run build || ionic build || echo "Build skipped"
      - name: Sync native dependencies
        script: |
          chmod +x node_modules/.bin/cap
          # 파일 구조가 어긋나 있을 수 있으므로, ios 폴더가 있는지 먼저 확인하고 동기화합니다.
          if [ -d "ios" ]; then
            npx cap sync ios
          else
            echo "ios 폴더를 찾을 수 없습니다. 경로를 확인해주세요."
            ls -F
          fi
      - name: CocoaPods
        script: |
          find . -name "Podfile" -exec dirname {} \; | xargs -I {} sh -c 'cd {} && pod install'
      - name: Build for App Store
        script: |
          xcode-project build
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
