workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Prepare Web Assets
        script: |
          mkdir -p www
          cp index.html www/
          cp -r css www/ || true
          cp -r js www/ || true
      - name: Install Dependencies
        script: |
          npm install
          npm install -g @capacitor/cli
      - name: Add and Sync iOS
        script: |
          rm -rf ios
          capacitor add ios
          capacitor copy
          capacitor sync ios
      - name: Build iOS App
        script: |
          cd ios
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -archivePath App.xcarchive archive
