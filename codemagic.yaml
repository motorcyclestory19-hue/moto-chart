workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Install Node Modules
        script: npm install
      - name: Build Web Assets
        script: npm run build
      - name: Add and Sync iOS
        script: |
          # 기존 ios 폴더 제거 후 다시 추가 (충돌 방지)
          rm -rf ios
          npx cap add ios
          npx cap sync ios
      - name: Build iOS App
        script: |
          cd ios
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -archivePath App.xcarchive archive
