workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Force Web Build
        script: |
          # package.json에 의존하지 않고, 직접 도구를 호출합니다.
          # Ionic이면 ionic build, 아니면 기본 npm 빌드 도구를 실행
          if [ -f "ionic.config.json" ]; then
            npx ionic build
          else
            # 프로젝트 폴더 내의 가능한 모든 빌드 도구 실행 시도
            npx tsc || echo "TypeScript 빌드 생략"
            npx vite build || echo "Vite 빌드 생략"
            npx webpack --mode production || echo "Webpack 빌드 생략"
          fi
      - name: Sync and Build iOS
        script: |
          # 생성된 폴더(dist, build, www)를 찾아 동기화
          WEB_DIR=$(ls -d dist build www 2>/dev/null | head -1)
          npx cap sync ios --webDir ${WEB_DIR:-www}
          
          cd ios
          # CocoaPods가 이미 설치되어 있다면 건너뛰고 빌드
          pod install || echo "Pods 이미 설치됨"
          xcodebuild -workspace *.xcworkspace -scheme App -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
