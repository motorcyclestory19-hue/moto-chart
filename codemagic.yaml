workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          # npm 스크립트를 거치지 않고, 빌드 도구가 설치된 경로를 찾아 강제로 실행합니다
          # React/Vue/Ionic 등 프로젝트 종류에 따라 아래 명령 중 하나가 통할 것입니다
          ./node_modules/.bin/ionic build || ./node_modules/.bin/ng build || ./node_modules/.bin/tsc
      - name: Sync native dependencies
        script: |
          # 생성된 폴더를 자동으로 찾아 동기화
          FOLDER=$(ls -d dist build www 2>/dev/null | head -1)
          [ -z "$FOLDER" ] && echo "웹 빌드 폴더를 찾을 수 없습니다" && exit 1
          npx cap sync ios --webDir $FOLDER
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for App Store
        script: |
          xcodebuild -workspace ios/*.xcworkspace -scheme App -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
