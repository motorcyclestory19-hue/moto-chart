workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: v20 # 가능한 최신 노드 버전을 명시하여 버전 충돌 방지
    scripts:
      - name: Hard Reset Environment
        script: |
          # 1. 꼬일 수 있는 모든 환경 파일 강제 삭제
          rm -rf node_modules
          rm -rf package-lock.json
          # 2. 캐시까지 완전히 비워버립니다
          npm cache clean --force
      - name: Clean Install
        script: |
          # 3. 아주 깨끗한 상태에서 다시 설치
          npm install
      - name: Sync and Build
        script: |
          # 4. 빌드 스크립트 없이, Capacitor만 깨끗하게 동기화
          npx cap sync ios
          # 5. 최종 빌드
          cd ios && pod install
          xcodebuild -workspace *.xcworkspace -scheme App -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
