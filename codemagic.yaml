workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Install Dependencies
        script: |
          npm install
          npm install -g @capacitor/cli
      - name: Build Web Assets
        script: npm run build
      - name: Add and Sync iOS
        script: |
          rm -rf ios
          # npx나 파일 경로를 직접 호출하지 않고 글로벌 cli를 사용합니다
          capacitor add ios
          capacitor sync ios
      - name: Build iOS App
        script: |
          cd ios
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -archivePath App.xcarchive archive
