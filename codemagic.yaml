workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm cache clean --force
          npm install --unsafe-perm
      - name: Build web assets
        script: |
          # 빌드 명령을 더 범용적으로 변경
          npm run build || ionic build || echo "Build skipped"
      - name: Sync native dependencies
        script: |
          chmod +x node_modules/.bin/cap
          npx cap sync ios
      - name: CocoaPods
        script: |
          # Podfile이 있는 곳을 자동으로 찾아서 설치하도록 수정
          find . -name "Podfile" -exec dirname {} \; | xargs -I {} sh -c 'cd {} && pod install'
      - name: Build for App Store
        script: |
          xcode-project build
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
