workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Install Node Modules
        script: npm install
      - name: Build Web Assets
        script: npm run build
      - name: Add and Sync iOS
        script: |
          rm -rf ios
          # npx 대신 npm으로 직접 모듈을 호출하여 권한 우회
          ./node_modules/.bin/cap add ios
          ./node_modules/.bin/cap sync ios
      - name: Build iOS App
        script: |
          cd ios
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -archivePath App.xcarchive archive
