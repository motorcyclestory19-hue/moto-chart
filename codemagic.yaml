workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Prepare Web Assets
        script: |
          mkdir -p www
          cp -r index.html css js www/ || true
      - name: Install Dependencies
        script: |
          npm install
          npm install -g @capacitor/cli
      - name: Setup iOS
        script: |
          rm -rf ios
          capacitor add ios
          capacitor sync ios
          # 강제로 이동해서 파일이 진짜 생성되었는지 확인
          cd ios/App
          ls -F
      - name: Build iOS App
        script: |
          cd ios/App
          # Podfile 생성 및 설치
          pod init || true
          pod install
          # 워크스페이스가 생성되었는지 확인 후 빌드
          if [ -f "App.xcworkspace" ]; then
             xcodebuild -workspace App.xcworkspace -scheme App -archivePath App.xcarchive archive
          else
             echo "ERROR: xcworkspace still not found in ios/App"
             exit 1
          fi
