workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build || echo "Build script skipped"
      - name: Sync native dependencies
        script: |
          # 1. 권한을 먼저 확실하게 부여합니다
          chmod -R 755 node_modules/
          # 2. npx를 통해 권한 문제를 우회하여 실행합니다
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for App Store
        script: |
          xcode-project build --workspace ios/*.xcworkspace --scheme App
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
