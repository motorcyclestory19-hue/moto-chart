workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build || ionic build
      - name: Sync native dependencies
        script: |
          # npx나 .bin 경로를 직접 타지 않고, 노드로 직접 Capacitor를 실행합니다
          node node_modules/@capacitor/cli/bin/capacitor sync ios
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for App Store
        script: |
          xcode-project build --workspace ios/*.xcworkspace --scheme App
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
