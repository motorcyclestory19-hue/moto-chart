workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Clean and Setup Environment
        script: |
          # 1. 기존의 충돌을 일으키는 환경 파일들을 모두 삭제합니다.
          rm -rf node_modules package-lock.json ios/
          # 2. 깨끗한 상태에서 필요한 도구만 설치합니다.
          npm install
      - name: Build and Sync
        script: |
          # 3. 빌드 명령어가 없으므로, 웹 파일들을 강제로 복사합니다.
          # (이미 웹 파일이 생성되어 있다고 가정합니다)
          npx cap sync ios
      - name: Install and Build iOS
        script: |
          cd ios
          pod install
          xcodebuild -workspace *.xcworkspace -scheme App -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
