workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      node: 22
    scripts:
      - name: Prepare Web Assets
        script: |
          mkdir -p www
          cp -r index.html css js www/ || true
      - name: Install Dependencies
        script: |
          npm install
          npm install -g @capacitor/cli
      - name: Setup iOS
        script: |
          rm -rf ios
          capacitor add ios
          capacitor copy
          capacitor sync ios
          cd ios
          # CocoaPods가 명확하게 프로젝트 구조를 생성하게 합니다
          pod install
      - name: Build iOS App
        script: |
          cd ios
          # 이제 App.xcworkspace가 생성되었을 것입니다
          if [ -f "App.xcworkspace" ]; then
             xcodebuild -workspace App.xcworkspace -scheme App -archivePath App.xcarchive archive
          else
             echo "ERROR: App.xcworkspace still missing. Listing files:"
             ls -F
             exit 1
          fi
