workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          # 빌드를 수행하고, 결과물이 어디에 있는지 확인합니다.
          npm run build || ionic build
          ls -F
      - name: Fix Capacitor Config and Sync
        script: |
          # 1. 빌드 결과물이 dist인지, build인지, www인지 확인하고
          # capacitor.config.json의 webDir 값을 강제로 해당 폴더로 수정합니다.
          # 예: dist 폴더가 생성되었다면 webDir을 dist로 설정
          if [ -d "dist" ]; then
            npx cap config set webDir dist
          elif [ -d "build" ]; then
            npx cap config set webDir build
          elif [ -d "www" ]; then
            npx cap config set webDir www
          fi
          # 2. 설정이 완료된 후 동기화
          node node_modules/@capacitor/cli/bin/capacitor sync ios
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build for App Store
        script: |
          xcodebuild -workspace ios/*.xcworkspace -scheme App -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
