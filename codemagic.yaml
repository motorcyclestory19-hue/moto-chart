workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          # npm run build 대신에 실제 웹 소스를 빌드하는 명령어를 넣어야 합니다.
          # 만약 build 명령이 없다면, 아래 줄을 삭제하거나 npm run build를 그대로 두세요.
          npm run build || echo "Build script not found, skipping"
      - name: Sync native dependencies
        script: |
          chmod +x node_modules/.bin/cap
          npx cap sync ios
      - name: CocoaPods
        script: |
          cd ios && pod install && cd ..
      - name: Build for App Store
        script: |
          xcode-project build --workspace ios/App.xcworkspace --scheme App
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
