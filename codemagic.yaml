workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Bypass Web Build
        script: |
          # 빌드 스크립트가 없으므로, 현재 있는 파일을 그대로 사용합니다.
          # 이미 웹 결과물 폴더(www, build, 또는 dist)가 있는지 확인합니다.
          echo "빌드 과정을 건너뛰고 기존 웹 파일로 배포를 진행합니다."
          ls -F
      - name: Sync and Build iOS
        script: |
          # 존재하는 웹 폴더를 찾아 Capacitor 동기화
          WEB_DIR=$(ls -d dist build www 2>/dev/null | head -1)
          if [ -z "$WEB_DIR" ]; then
             echo "웹 폴더를 찾을 수 없습니다. 배포를 위해 폴더명을 확인해주세요."
             exit 1
          fi
          npx cap sync ios --webDir $WEB_DIR
          
          cd ios
          pod install
          xcodebuild -workspace *.xcworkspace -scheme App -archivePath App.xcarchive archive
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
